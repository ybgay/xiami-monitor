apiVersion: v1
kind: Pod
metadata:
  name: xiami-monitor
  namespace: default
  labels:
    app: xiami-monitor

spec:
  nodeName: master
  restartPolicy: Always

  containers:
    - name: xiami-monitor
      image: xiami-monitor:1.0
      imagePullPolicy: IfNotPresent

      ports:
        - containerPort: 30812

      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      readinessProbe:
        httpGet:
          path: /
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10

      livenessProbe:
        httpGet:
          path: /
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 20