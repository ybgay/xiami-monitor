apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiami-monitor
  namespace: default   
  labels:
    app: xiami-monitor

spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiami-monitor

  template:
    metadata:
      labels:
        app: xiami-monitor

    spec:
      containers:
        - name: xiami-monitor
          image: xiami-monitor:1.0   
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080   

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20